services:
  postgres:
    image: postgres:16-alpine
    container_name: printos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: printos_ai
      POSTGRES_USER: printos
      POSTGRES_PASSWORD: printos
    ports:
      - '${DB_HOST_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: printos-redis
    restart: unless-stopped
    ports:
      - '${REDIS_HOST_PORT:-6380}:6379'
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: printos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: printos-api
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - minio
    ports:
      - '${API_HOST_PORT:-3002}:${API_PORT:-3002}'

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    container_name: printos-web
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - '${WEB_PORT:-3000}:3000'

  admin:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.admin
    container_name: printos-admin
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - '${ADMIN_PORT:-3001}:3001'

volumes:
  postgres_data:
    name: subligo_printos_postgres_data_v2
  redis_data:
    name: subligo_printos_redis_data_v1
  minio_data:
    name: subligo_printos_minio_data_v1
